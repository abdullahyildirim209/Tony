seed: 42

data:
  asset: "BTC-USD"
  source: "yfinance"
  binance_symbol: "BTCUSDT"
  hf_cache_dir: "data/hf_cache"
  start_date: "2019-01-01"
  end_date: "2024-12-31"
  train_end: "2023-01-01"
  val_end: "2024-01-01"
  save_dir: "data"

env:
  window_size: 30
  episode_length: 126
  initial_cash: 10000
  transaction_cost: 0.001
  max_drawdown_threshold: 0.50
  terminal_reward_bonus: true
  random_init: true
  random_init_long_prob: 0.3
  turbulence_threshold_pct: 90

indicators:
  sma_short: 7
  sma_long: 21
  rsi_period: 14
  turbulence_lookback: 63

agent:
  algorithm: "PPO"
  learning_rate: 3.0e-4
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  net_arch:
    - 128
    - 128

training:
  total_timesteps: 500000
  validate_every: 10000
  early_stopping_patience: 5
  n_envs: 4
  tensorboard_log: "runs"
  model_save_dir: "models"
  best_model_name: "best_model"

validation:
  n_val_episodes: 5
  selection_metric: "sortino_ratio"

ensemble:
  algorithms:
    - "dqn"
  algorithm_kwargs:
    ppo:
      n_steps: 2048
      batch_size: 64
      n_epochs: 10
      ent_coef: 0.01
    a2c:
      n_steps: 128
      ent_coef: 0.01
    dqn:
      batch_size: 64
      learning_starts: 1000
      exploration_fraction: 0.3
      exploration_final_eps: 0.05

evaluation:
  baselines:
    - "buy_and_hold"
    - "random"
    - "sma_crossover"
  results_dir: "results"
  plots_dir: "results/plots"

live:
  warmup_days: 60
  log_dir: "live/logs"
  state_dir: "live/state"

experiments:
  walk_forward:
    total_timesteps: 1500000
    folds:
      - name: "fold_1"
        train_start: "2019-01-01"
        train_end: "2021-07-01"
        val_end: "2022-04-01"
        test_end: "2023-01-01"
      - name: "fold_2"
        train_start: "2019-07-01"
        train_end: "2022-01-01"
        val_end: "2022-10-01"
        test_end: "2023-07-01"
      - name: "fold_3"
        train_start: "2020-01-01"
        train_end: "2022-07-01"
        val_end: "2023-04-01"
        test_end: "2024-01-01"
      - name: "fold_4"
        train_start: "2020-07-01"
        train_end: "2023-01-01"
        val_end: "2023-10-01"
        test_end: "2024-07-01"
      - name: "fold_5"
        train_start: "2021-01-01"
        train_end: "2023-07-01"
        val_end: "2024-04-01"
        test_end: "2025-01-01"
  statistical:
    n_bootstrap: 10000
    confidence_level: 0.95
